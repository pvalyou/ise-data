name: Snapshots (live)

# Live, database-sourced snapshots. "X minutes" lives here - tune the cron.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize ALL snapshot tiers so commits/pushes never race each other.
concurrency:
  group: snapshots-commit
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      CADENCE: live
    steps:
      - uses: actions/checkout@v7

      - name: Fetch snapshots from ise-api
        run: bash scripts/fetch-snapshots.sh

      - name: Commit changed snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/commit-snapshots.sh

      - name: Push
        run: git push
